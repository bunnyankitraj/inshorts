# ============================================================
# Server
# ============================================================
spring.config.import=optional:file:.env[.properties]
server.port=8080

# ============================================================
# H2 In-Memory Database
# ============================================================
spring.datasource.url=jdbc:h2:mem:newsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
spring.jackson.default-property-inclusion=non_null

# ============================================================
# OpenAI LLM Configuration
# ============================================================
llm.openai.api-key=${OPENAI_API_KEY:your-openai-api-key-here}
llm.openai.model=gpt-4o-mini
llm.openai.base-url=https://api.openai.com/v1
llm.summary.delay-ms=1000

# ============================================================
# News Data Ingestion
# ============================================================
news.data.file-path=classpath:data/news_data.json

# ============================================================
# Trending Feed
# ============================================================
trending.radius.km=50
trending.cache.ttl-minutes=5
trending.max-results=10

# ============================================================
# Nearby Search
# ============================================================
nearby.default-radius.km=10

# ============================================================
# Logging
# ============================================================
logging.level.com.inshorts=INFO
logging.level.org.springframework.web=WARN
