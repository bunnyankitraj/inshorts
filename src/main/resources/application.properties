# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Active Profile: 'h2' for local (no Postgres needed)
#                 'postgres' for production
# To switch: change spring.profiles.active below
# ============================================================
spring.profiles.active=h2

# ============================================================
# H2 In-Memory Database (active when profile = h2)
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
spring.jackson.default-property-inclusion=non_null

# ============================================================
# LLM Configuration
# Default: Google Gemini. Switch to 'openai' if needed.
# ============================================================
llm.provider=gemini
llm.gemini.api-key=${GEMINI_API_KEY:your-gemini-api-key-here}
llm.gemini.model=gemini-1.5-flash
llm.gemini.base-url=https://generativelanguage.googleapis.com/v1beta

llm.openai.api-key=${OPENAI_API_KEY:your-openai-api-key-here}
llm.openai.model=gpt-4o-mini
llm.openai.base-url=https://api.openai.com/v1

# ============================================================
# News Data Ingestion
# ============================================================
news.data.file-path=classpath:news_data.json

# ============================================================
# Trending Feed
# ============================================================
trending.radius.km=50
trending.cache.ttl-minutes=5
trending.max-results=10

# ============================================================
# Nearby Search
# ============================================================
nearby.default-radius.km=10

# ============================================================
# Logging
# ============================================================
logging.level.com.inshorts=INFO
logging.level.org.springframework.web=WARN
